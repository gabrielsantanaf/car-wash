services:
  postgres:
    restart: always

  redis:
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes: []
    ports:
      - "127.0.0.1:8000:8000"
    restart: always
    command: ["sh", "-c", "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"]

  notification:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    volumes: []
    ports: []
    restart: always
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]

  evolution:
    ports: []
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes: []
    ports:
      - "127.0.0.1:3000:3000"
    restart: always
    command: ["node", "server.js"]

  nginx:
    profiles:
      - disabled
