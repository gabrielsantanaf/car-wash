services:
  postgres:
    restart: always

  redis:
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes: []
    ports:
      - "127.0.0.1:8000:8000"
    restart: always
    command: []

  notification:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    volumes: []
    ports:
      - "127.0.0.1:8001:8001"
    restart: always
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]

  evolution:
    ports:
      - "127.0.0.1:8080:8080"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes: []
    ports:
      - "127.0.0.1:3000:3000"
    restart: always
    command: []

  nginx:
    profiles:
      - disabled
